description: FOCUS-aligned FinOps mapping for Spot (by Flexera) — savings-share billing on Eco/Ocean/Elastigroup with cloud-spend-under-management as the primary meter. Spot itself is a FinOps tool, so this artifact also describes the meters consumers should expose to their own FinOps practice.
notes: Public pricing is contact-sales; meters reflect documented Spot product behavior (compute hours managed, commitments managed, net savings delivered).
sources:
  - https://www.flexera.com/products
  - https://spot.io/products/
billingModel:
  pricingCategory: Savings Share
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Spot by NetApp / Flexera
  ServiceCategory: FinOps / Cloud Cost Optimization
  ProviderName: Flexera Software LLC
  PublisherName: Flexera Software LLC
  InvoiceIssuerName: Flexera Software LLC
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: net_savings_delivered
    description: Net cloud savings delivered by Spot Eco (commitment portfolio optimization) — primary basis for savings-share billing
    unit: USD
    aggregation: sum
    dimensions:
      - cloud_provider
      - account
      - service
  - name: managed_compute_hours
    description: Compute hours under management by Elastigroup / Ocean
    unit: instance-hour
    aggregation: sum
    dimensions:
      - cloud_provider
      - region
      - cluster
      - instance_family
  - name: commitments_managed
    description: Reserved-instance / Savings-Plan / CUD volume managed by Eco
    unit: USD
    aggregation: avg
    dimensions:
      - cloud_provider
      - commitment_type
  - name: managed_clusters
    description: Kubernetes clusters managed by Spot Ocean
    unit: cluster-month
    aggregation: max
    dimensions:
      - cloud_provider
      - region
principles:
  - name: Visibility
    description: Pull Spot's Cloud Analyzer and Eco reporting daily; reconcile reported "net savings" against your CUR/Cost-and-Usage report to validate the savings-share invoice.
  - name: Allocation
    description: Tag clusters and groups in Spot with cost-center metadata so Spot's allocation views align with FOCUS dimensions you use for chargeback.
  - name: Optimization
    description: Spot is itself the optimization layer — measure unit-cost (cost per pod-hour, cost per instance-hour) before/after enabling Ocean and Eco and tune autoscaling policies based on observed savings.
  - name: Accountability
    description: Cloud platform / FinOps team owns the Spot relationship; finance audits the savings-share invoice against independent CUR-based savings calculations quarterly.
maintainers: []
