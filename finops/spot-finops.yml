description: FOCUS-aligned FinOps placeholder for Spot (Flexera). Spot is itself
  a FinOps tool, but its own commercial pricing is contracted via Flexera sales
  and not exposed as a self-serve, per-call billing surface.
sources:
  - https://spot.io/
  - https://www.flexera.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Flexera Software LLC
serviceCategory: Cloud Cost Optimization
billingModel:
  pricingCategory: Contact Sales
  billingFrequency: Per-Contract
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Spot
  ServiceCategory: Cloud Cost Optimization
  ProviderName: Spot (Flexera)
  PublisherName: Flexera Software LLC
  InvoiceIssuerName: Flexera Software LLC
  BillingCurrency: USD
meters:
  - name: contracted_license
    description: Placeholder for the Spot license meter; historical Spot
      commercial models include percentage-of-savings and per-managed-resource
      subscription, both contract-defined.
    unit: varies
    aggregation: sum
    dimensions:
      - product
      - cloud_account
principles:
  - name: Visibility
    description: Spot's UI exposes savings and resource utilization for the
      products it manages; the cost of Spot itself is invoiced by Flexera under
      the master agreement.
  - name: Allocation
    description: Allocate Spot license cost against the platform / SRE team that
      operates the Ocean, Elastigroup, or Eco surface; allocate the savings Spot
      delivers against the workload teams whose cloud accounts are managed.
  - name: Optimization
    description: Optimize the relationship by measuring net savings (cloud
      reduction minus Spot license fee). Renegotiate at renewal based on the
      realized savings ratio.
  - name: Accountability
    description: Owned by the FinOps / cloud platform team that contracts Spot
      and runs the optimization workflows.
notes: No public per-call billing surface for Spot's own service; entry exists
  for catalog completeness.
maintainers:
