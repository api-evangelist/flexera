specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Spot
providerId: spot
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Autoscaling
  - Cloud Infrastructure
  - Cost Optimization
  - Kubernetes
  - Spot Instances
  - Rate Limiting
description: Spot.io / Flexera does not publish per-second numeric rate limits for the public Spot API at api.spotinst.io. Bearer-token authenticated requests are subject to standard 429 throttling and an X-Request-Id is returned for correlation. Bulk operations (large cluster updates, savings reports) may queue.
notes: No public rate-limit table at docs.spot.io; raise limits or coordinate burst usage via Spot support.
sources:
  - https://docs.spot.io/api/
  - https://spec.dev.spot.io/
headers:
  requestId: X-Request-Id
  retryAfter: Retry-After
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Spot API default throttle
    scope: account/api-token
    metric: varies
    limit: not publicly published; standard 429/503 throttling applies
    applies:
      - Spot Elastigroup API
      - Spot Ocean API
      - Spot Eco API
      - Spot Cloud Analyzer API
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter on 429/5xx and honor Retry-After when present.
  - name: Bulk Operation Queueing
    description: Long-running operations (cluster scale-out, commitment optimization runs) are asynchronous; poll the operation endpoint rather than retry the originating request.
  - name: Per-Account Tokens
    description: API tokens are scoped to the Spot account; rotate via the console; revoking a token deauthorizes immediately.
maintainers: []
