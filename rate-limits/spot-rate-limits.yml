specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Spot
providerId: spot
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cloud Infrastructure
  - Cost Optimization
  - Rate Limiting
description: Spot (Flexera) does not publish a consolidated rate-limits page for
  its API. Throttling and quota behavior, where applied, are governed by the
  customer's commercial agreement and the underlying cloud provider's APIs that
  Ocean / Elastigroup / Eco proxy.
sources:
  - https://docs.spot.io/
  - https://spec.dev.spot.io/
notes: Public OpenAPI spec is published at spec.dev.spot.io but does not enumerate
  global per-second / per-minute throttle thresholds. Spec is exceptionally large
  and not summarisable in a single fetch.
responseCodes:
  unauthorized: 401
  forbidden: 403
  throttled: 429
limits:
  - name: Spot Platform API
    scope: account
    metric: varies
    limit: see Spot API spec at spec.dev.spot.io
    notes: Per-endpoint behavior is documented in the OpenAPI spec; consolidated
      throttle thresholds are not published publicly.
  - name: Underlying Cloud Provider Limits
    scope: cloud-account
    metric: varies
    limit: governed by AWS / Azure / GCP quotas
    notes: For provisioning operations that proxy the cloud provider's APIs,
      effective limits are bounded by the underlying cloud account's service
      quotas.
policies:
  - name: Token-Based Authentication
    description: API access is via Personal Access Token / OAuth; rate-limit
      scoping follows the authenticated account.
  - name: Cloud Quota Inheritance
    description: Operations that ultimately invoke AWS / Azure / GCP APIs inherit
      the cloud provider's throttling characteristics.
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
