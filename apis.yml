  - aid: spot:billing-engine-api
    name: Spot Billing Engine API
    description: >-
      The Spot Billing Engine API provides programmatic access to cloud billing
      management, cost allocation, and invoicing capabilities. Billing Engine
      streamlines multi-cloud invoicing with intelligent cost allocation,
      chargeback and showback reporting, and comprehensive billing analytics
      across AWS, Azure, and GCP accounts.
