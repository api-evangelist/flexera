description: >-
  Spot by Flexera provides cloud infrastructure automation and optimization
  solutions. The platform includes Elastigroup for compute workload management
  across spot, reserved, and on-demand instances, Ocean for Kubernetes and
  container infrastructure automation, and Eco for cloud commitment management.
  The Spot API enables programmatic control over all platform capabilities
  including administration, compute groups, Kubernetes clusters, and cost
  optimization.
