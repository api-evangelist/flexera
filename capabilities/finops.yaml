naftiko: 1.0.0-alpha2
info:
  label: Spot FinOps
  description: Unified workflow for cloud financial operations combining commitment management (Eco), billing analytics (Billing
    Engine), and cost optimization. Used by FinOps teams, cloud finance analysts, and platform administrators.
  tags:
  - Spot
  - FinOps
  - Cost Optimization
  - Billing
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    SPOT_API_TOKEN: SPOT_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: spot-eco
    baseUri: https://api.spotinst.io
    description: Spot Eco API
    authentication:
      type: bearer
      token: '{{SPOT_API_TOKEN}}'
    resources:
    - name: commitments-aws
      path: /eco/aws
      description: AWS commitment management
      operations:
      - name: list-commitment-plans-aws
        method: GET
        description: List AWS commitment plans
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-commitment-plan-aws
        method: GET
        description: Get an AWS commitment plan
        inputParameters:
        - name: planId
          in: path
          type: string
          required: true
          description: Plan ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-unused-ris-aws
        method: GET
        description: Get unused AWS reserved instances
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-savings-plans-aws
        method: GET
        description: List AWS savings plans
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-reserved-instances-aws
        method: GET
        description: List AWS reserved instances
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-savings-analysis-aws
        method: GET
        description: Get AWS savings analysis
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-commitment-analysis-aws
        method: GET
        description: Get AWS commitment analysis
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: commitments-azure
      path: /eco/azure
      description: Azure commitment management
      operations:
      - name: list-commitment-plans-azure
        method: GET
        description: List Azure commitment plans
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-savings-analysis-azure
        method: GET
        description: Get Azure savings analysis
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: commitments-gcp
      path: /eco/gcp
      description: GCP commitment management
      operations:
      - name: list-commitment-plans-gcp
        method: GET
        description: List GCP commitment plans
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-savings-analysis-gcp
        method: GET
        description: Get GCP savings analysis
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: spot-billing
    baseUri: https://api.spotinst.io
    description: Spot Billing Engine API
    authentication:
      type: bearer
      token: '{{SPOT_API_TOKEN}}'
    resources:
    - name: billing-accounts
      path: /billing/account
      description: Manage billing accounts
      operations:
      - name: list-billing-accounts
        method: GET
        description: List billing engine accounts
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: setup-billing-engine
        method: POST
        description: Set up billing engine
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: validate-billing-setup
        method: POST
        description: Validate billing engine setup
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: account-families
      path: /billing/accountFamily
      description: Manage account families
      operations:
      - name: create-account-family
        method: POST
        description: Create an account family
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-account-families
        method: GET
        description: List account families
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-account-family
        method: GET
        description: Get an account family
        inputParameters:
        - name: familyId
          in: path
          type: string
          required: true
          description: Account family ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-account-family
        method: PUT
        description: Update an account family
        inputParameters:
        - name: familyId
          in: path
          type: string
          required: true
          description: Account family ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-account-family
        method: DELETE
        description: Delete an account family
        inputParameters:
        - name: familyId
          in: path
          type: string
          required: true
          description: Account family ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: cost-analysis
      path: /billing/costAnalysis
      description: Cost analysis
      operations:
      - name: get-cost-analysis
        method: GET
        description: Get cost analysis data
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: cost-intelligence
      path: /billing/costIntelligence
      description: Cost intelligence
      operations:
      - name: setup-cost-intelligence
        method: POST
        description: Set up cost intelligence
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: validate-cost-intelligence
        method: POST
        description: Validate cost intelligence setup
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
