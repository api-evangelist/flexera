        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
          description: User ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-programmatic-user
        method: POST
        description: Create a programmatic API user
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
