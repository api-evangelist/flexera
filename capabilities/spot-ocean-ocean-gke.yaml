naftiko: 1.0.0-alpha2
info:
  label: Spot Ocean API — Ocean GKE
  description: 'Spot Ocean API — Ocean GKE. 5 operations. Lead operation: Spot Create Ocean Cluster (gke). Self-contained
    Naftiko capability covering one Flexera business surface.'
  tags:
  - Flexera
  - Ocean GKE
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FLEXERA_API_KEY: FLEXERA_API_KEY
capability:
  consumes:
  - type: http
    namespace: spot-ocean-ocean-gke
    baseUri: https://api.spotinst.io
    description: Spot Ocean API — Ocean GKE business capability. Self-contained, no shared references.
    resources:
    - name: ocean-gke-cluster
      path: /ocean/gke/cluster
      operations:
      - name: createoceanclustergke
        method: POST
        description: Spot Create Ocean Cluster (gke)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listoceanclustersgke
        method: GET
        description: Spot List Ocean Clusters (gke)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: ocean-gke-cluster-oceanClusterId
      path: /ocean/gke/cluster/{oceanClusterId}
      operations:
      - name: getoceanclustergke
        method: GET
        description: Spot Get Ocean Cluster (gke)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: oceanClusterId
          in: path
          type: string
          required: true
      - name: updateoceanclustergke
        method: PUT
        description: Spot Update Ocean Cluster (gke)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: oceanClusterId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteoceanclustergke
        method: DELETE
        description: Spot Delete Ocean Cluster (gke)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: oceanClusterId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.FLEXERA_API_KEY}}'
  exposes:
  - type: rest
    namespace: spot-ocean-ocean-gke-rest
    port: 8080
    description: REST adapter for Spot Ocean API — Ocean GKE. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/ocean/gke/cluster
      name: ocean-gke-cluster
      description: REST surface for ocean-gke-cluster.
      operations:
      - method: POST
        name: createoceanclustergke
        description: Spot Create Ocean Cluster (gke)
        call: spot-ocean-ocean-gke.createoceanclustergke
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listoceanclustersgke
        description: Spot List Ocean Clusters (gke)
        call: spot-ocean-ocean-gke.listoceanclustersgke
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/ocean/gke/cluster/{oceanclusterid}
      name: ocean-gke-cluster-oceanclusterid
      description: REST surface for ocean-gke-cluster-oceanClusterId.
      operations:
      - method: GET
        name: getoceanclustergke
        description: Spot Get Ocean Cluster (gke)
        call: spot-ocean-ocean-gke.getoceanclustergke
        with:
          oceanClusterId: rest.oceanClusterId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateoceanclustergke
        description: Spot Update Ocean Cluster (gke)
        call: spot-ocean-ocean-gke.updateoceanclustergke
        with:
          oceanClusterId: rest.oceanClusterId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteoceanclustergke
        description: Spot Delete Ocean Cluster (gke)
        call: spot-ocean-ocean-gke.deleteoceanclustergke
        with:
          oceanClusterId: rest.oceanClusterId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: spot-ocean-ocean-gke-mcp
    port: 9090
    transport: http
    description: MCP adapter for Spot Ocean API — Ocean GKE. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: spot-create-ocean-cluster-gke
      description: Spot Create Ocean Cluster (gke)
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: spot-ocean-ocean-gke.createoceanclustergke
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: spot-list-ocean-clusters-gke
      description: Spot List Ocean Clusters (gke)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spot-ocean-ocean-gke.listoceanclustersgke
      outputParameters:
      - type: object
        mapping: $.
    - name: spot-get-ocean-cluster-gke
      description: Spot Get Ocean Cluster (gke)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spot-ocean-ocean-gke.getoceanclustergke
      with:
        oceanClusterId: tools.oceanClusterId
      outputParameters:
      - type: object
        mapping: $.
    - name: spot-update-ocean-cluster-gke
      description: Spot Update Ocean Cluster (gke)
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: spot-ocean-ocean-gke.updateoceanclustergke
      with:
        oceanClusterId: tools.oceanClusterId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: spot-delete-ocean-cluster-gke
      description: Spot Delete Ocean Cluster (gke)
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: spot-ocean-ocean-gke.deleteoceanclustergke
      with:
        oceanClusterId: tools.oceanClusterId
      outputParameters:
      - type: object
        mapping: $.
