      description: REST surface for setup-user.
      operations:
      - method: POST
        name: createuser
        description: Spot Create User
        call: spot-administration-users.createuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/setup/user/programmatic
