naftiko: 1.0.0-alpha2
info:
  label: Spot Eco API — Eco Azure
  description: 'Spot Eco API — Eco Azure. 1 operations. Lead operation: Spot List Commitment Plans (azure). Self-contained
    Naftiko capability covering one Flexera business surface.'
  tags:
  - Flexera
  - Eco Azure
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FLEXERA_API_KEY: FLEXERA_API_KEY
capability:
  consumes:
  - type: http
    namespace: spot-eco-eco-azure
    baseUri: https://api.spotinst.io
    description: Spot Eco API — Eco Azure business capability. Self-contained, no shared references.
    resources:
    - name: eco-azure-commitmentPlan
      path: /eco/azure/commitmentPlan
      operations:
      - name: listcommitmentplansazure
        method: GET
        description: Spot List Commitment Plans (azure)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.FLEXERA_API_KEY}}'
  exposes:
  - type: rest
    namespace: spot-eco-eco-azure-rest
    port: 8080
    description: REST adapter for Spot Eco API — Eco Azure. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/eco/azure/commitmentplan
      name: eco-azure-commitmentplan
      description: REST surface for eco-azure-commitmentPlan.
      operations:
      - method: GET
        name: listcommitmentplansazure
        description: Spot List Commitment Plans (azure)
        call: spot-eco-eco-azure.listcommitmentplansazure
        with:
          accountId: rest.accountId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: spot-eco-eco-azure-mcp
    port: 9090
    transport: http
    description: MCP adapter for Spot Eco API — Eco Azure. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: spot-list-commitment-plans-azure
      description: Spot List Commitment Plans (azure)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spot-eco-eco-azure.listcommitmentplansazure
      with:
        accountId: tools.accountId
      outputParameters:
      - type: object
        mapping: $.
