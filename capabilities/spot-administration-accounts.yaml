naftiko: 1.0.0-alpha2
info:
  label: Spot Administration API — Accounts
  description: 'Spot Administration API — Accounts. 4 operations. Lead operation: Spot Create Account. Self-contained Naftiko
    capability covering one Flexera business surface.'
  tags:
  - Flexera
  - Accounts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FLEXERA_API_KEY: FLEXERA_API_KEY
capability:
  consumes:
  - type: http
    namespace: spot-administration-accounts
    baseUri: https://api.spotinst.io
    description: Spot Administration API — Accounts business capability. Self-contained, no shared references.
    resources:
    - name: setup-account
      path: /setup/account
      operations:
      - name: createaccount
        method: POST
        description: Spot Create Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listaccounts
        method: GET
        description: Spot List Accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cloudAccountId
          in: query
          type: string
          description: Filter by cloud account ID.
    - name: setup-account-accountId
      path: /setup/account/{accountId}
      operations:
      - name: updateaccount
        method: PUT
        description: Spot Update Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteaccount
        method: DELETE
        description: Spot Delete Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.FLEXERA_API_KEY}}'
  exposes:
  - type: rest
    namespace: spot-administration-accounts-rest
    port: 8080
    description: REST adapter for Spot Administration API — Accounts. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/setup/account
      name: setup-account
      description: REST surface for setup-account.
      operations:
      - method: POST
        name: createaccount
        description: Spot Create Account
        call: spot-administration-accounts.createaccount
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listaccounts
        description: Spot List Accounts
        call: spot-administration-accounts.listaccounts
        with:
          cloudAccountId: rest.cloudAccountId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/setup/account/{accountid}
      name: setup-account-accountid
      description: REST surface for setup-account-accountId.
      operations:
      - method: PUT
        name: updateaccount
        description: Spot Update Account
        call: spot-administration-accounts.updateaccount
        with:
          accountId: rest.accountId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteaccount
        description: Spot Delete Account
        call: spot-administration-accounts.deleteaccount
        with:
          accountId: rest.accountId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: spot-administration-accounts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Spot Administration API — Accounts. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: spot-create-account
      description: Spot Create Account
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: spot-administration-accounts.createaccount
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: spot-list-accounts
      description: Spot List Accounts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spot-administration-accounts.listaccounts
      with:
        cloudAccountId: tools.cloudAccountId
      outputParameters:
      - type: object
        mapping: $.
    - name: spot-update-account
      description: Spot Update Account
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: spot-administration-accounts.updateaccount
      with:
        accountId: tools.accountId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: spot-delete-account
      description: Spot Delete Account
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: spot-administration-accounts.deleteaccount
      with:
        accountId: tools.accountId
      outputParameters:
      - type: object
        mapping: $.
