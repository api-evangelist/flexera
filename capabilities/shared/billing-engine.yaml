naftiko: "1.0.0-alpha1"

info:
  label: "Spot Billing Engine"
  description: "Cloud billing management, cost allocation, and invoicing capabilities for multi-cloud environments."
  tags:
    - Spot
    - Billing
    - FinOps
    - Cost Allocation
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SPOT_API_TOKEN: SPOT_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: spot-billing
      baseUri: https://api.spotinst.io
      description: "Spot Billing Engine API"
      authentication:
        type: bearer
        token: "{{SPOT_API_TOKEN}}"
      resources:
        - name: billing-accounts
          path: /billing/account
          description: "Manage billing accounts"
          operations:
            - name: list-billing-accounts
              method: GET
              description: "List billing engine accounts"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: setup-billing-engine
              method: POST
              description: "Set up billing engine"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: validate-billing-setup
              method: POST
              description: "Validate billing engine setup"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: account-families
          path: /billing/accountFamily
          description: "Manage account families"
          operations:
            - name: create-account-family
              method: POST
              description: "Create an account family"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-account-families
              method: GET
              description: "List account families"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-account-family
              method: GET
              description: "Get an account family"
              inputParameters:
                - name: familyId
                  in: path
                  type: string
                  required: true
                  description: "Account family ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-account-family
              method: PUT
              description: "Update an account family"
              inputParameters:
                - name: familyId
                  in: path
                  type: string
                  required: true
                  description: "Account family ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-account-family
              method: DELETE
              description: "Delete an account family"
              inputParameters:
                - name: familyId
                  in: path
                  type: string
                  required: true
                  description: "Account family ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: cost-analysis
          path: /billing/costAnalysis
          description: "Cost analysis"
          operations:
            - name: get-cost-analysis
              method: GET
              description: "Get cost analysis data"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: cost-intelligence
          path: /billing/costIntelligence
          description: "Cost intelligence"
          operations:
            - name: setup-cost-intelligence
              method: POST
              description: "Set up cost intelligence"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: validate-cost-intelligence
              method: POST
              description: "Validate cost intelligence setup"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8104
      namespace: spot-billing-rest-api
      resources:
        - path: /v1/billing-accounts
          name: billing-accounts
          description: "Billing account management"
          operations:
            - method: GET
              name: list-billing-accounts
              description: "List billing accounts"
              call: "spot-billing.list-billing-accounts"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9104
      namespace: spot-billing-mcp
      transport: http
      tools:
        - name: list-billing-accounts
          description: "List billing engine accounts"
          hints:
            readOnly: true
          call: "spot-billing.list-billing-accounts"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-account-families
          description: "List account families"
          hints:
            readOnly: true
          call: "spot-billing.list-account-families"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-cost-analysis
          description: "Get cost analysis data"
          hints:
            readOnly: true
          call: "spot-billing.get-cost-analysis"
          outputParameters:
            - type: object
              mapping: "$."
