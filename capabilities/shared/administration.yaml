naftiko: "1.0.0-alpha1"

info:
  label: "Spot Administration"
  description: "Manage organizations, accounts, users, access policies, cloud credentials, and subscriptions within the Spot by Flexera platform."
  tags:
    - Spot
    - Administration
    - IAM
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SPOT_API_TOKEN: SPOT_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: spot-admin
      baseUri: https://api.spotinst.io
      description: "Spot Administration API"
      authentication:
        type: bearer
        token: "{{SPOT_API_TOKEN}}"
      resources:
        - name: organizations
          path: /setup/organization
          description: "Manage Spot organizations"
          operations:
            - name: create-organization
              method: POST
              description: "Create a new organization"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-organization
              method: DELETE
              description: "Delete an organization"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: accounts
          path: /setup/account
          description: "Manage Spot accounts"
          operations:
            - name: create-account
              method: POST
              description: "Create a new account"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-accounts
              method: GET
              description: "List all accounts"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-account
              method: PUT
              description: "Update an account"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-account
              method: DELETE
              description: "Delete an account"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: users
          path: /setup/user
          description: "Manage users"
          operations:
            - name: create-user
              method: POST
              description: "Create a new user"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-users
              method: GET
              description: "List organization users"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-user
              method: GET
              description: "Get a specific user"
              inputParameters:
                - name: userId
                  in: path
                  type: string
                  required: true
                  description: "User ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-user-permissions
              method: PUT
              description: "Update user permissions"
              inputParameters:
                - name: userId
                  in: path
                  type: string
                  required: true
                  description: "User ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-user
              method: DELETE
              description: "Delete a user"
              inputParameters:
                - name: userId
                  in: path
                  type: string
                  required: true
                  description: "User ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-programmatic-user
              method: POST
              description: "Create a programmatic API user"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: access-policies
          path: /setup/access/policy
          description: "Manage access policies"
          operations:
            - name: create-access-policy
              method: POST
              description: "Create an access policy"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-access-policies
              method: GET
              description: "List access policies"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-access-policy
              method: PUT
              description: "Update an access policy"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-access-policy
              method: DELETE
              description: "Delete an access policy"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: cloud-credentials
          path: /setup/credentials
          description: "Link cloud provider credentials"
          operations:
            - name: set-aws-credentials
              method: POST
              description: "Set AWS cloud credentials"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: set-azure-credentials
              method: POST
              description: "Set Azure cloud credentials"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: set-gcp-credentials
              method: POST
              description: "Set GCP cloud credentials"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: subscriptions
          path: /events/subscription
          description: "Manage event subscriptions"
          operations:
            - name: create-subscription
              method: POST
              description: "Create an event subscription"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-subscriptions
              method: GET
              description: "List event subscriptions"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-subscription
              method: DELETE
              description: "Delete an event subscription"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: health
          path: /healthCheck
          description: "API health check"
          operations:
            - name: health-check
              method: GET
              description: "Check API health status"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: spot-admin-rest-api
      resources:
        - path: /v1/accounts
          name: accounts
          description: "Account management"
          operations:
            - method: GET
              name: list-accounts
              description: "List all accounts"
              call: "spot-admin.list-accounts"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: spot-admin-mcp
      transport: http
      tools:
        - name: list-accounts
          description: "List all Spot accounts"
          hints:
            readOnly: true
          call: "spot-admin.list-accounts"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-users
          description: "List organization users"
          hints:
            readOnly: true
          call: "spot-admin.list-users"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-access-policies
          description: "List access policies"
          hints:
            readOnly: true
          call: "spot-admin.list-access-policies"
          outputParameters:
            - type: object
              mapping: "$."
        - name: health-check
          description: "Check API health"
          hints:
            readOnly: true
          call: "spot-admin.health-check"
          outputParameters:
            - type: object
              mapping: "$."
