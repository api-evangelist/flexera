naftiko: "1.0.0-alpha1"

info:
  label: "Spot Eco"
  description: "Cloud commitment management and optimization across AWS, Azure, and GCP for reserved instances, savings plans, and committed use discounts."
  tags:
    - Spot
    - Eco
    - FinOps
    - Cost Optimization
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SPOT_API_TOKEN: SPOT_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: spot-eco
      baseUri: https://api.spotinst.io
      description: "Spot Eco API"
      authentication:
        type: bearer
        token: "{{SPOT_API_TOKEN}}"
      resources:
        - name: commitments-aws
          path: /eco/aws
          description: "AWS commitment management"
          operations:
            - name: list-commitment-plans-aws
              method: GET
              description: "List AWS commitment plans"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-commitment-plan-aws
              method: GET
              description: "Get an AWS commitment plan"
              inputParameters:
                - name: planId
                  in: path
                  type: string
                  required: true
                  description: "Plan ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-unused-ris-aws
              method: GET
              description: "Get unused AWS reserved instances"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-savings-plans-aws
              method: GET
              description: "List AWS savings plans"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-reserved-instances-aws
              method: GET
              description: "List AWS reserved instances"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-savings-analysis-aws
              method: GET
              description: "Get AWS savings analysis"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-commitment-analysis-aws
              method: GET
              description: "Get AWS commitment analysis"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: commitments-azure
          path: /eco/azure
          description: "Azure commitment management"
          operations:
            - name: list-commitment-plans-azure
              method: GET
              description: "List Azure commitment plans"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-savings-analysis-azure
              method: GET
              description: "Get Azure savings analysis"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: commitments-gcp
          path: /eco/gcp
          description: "GCP commitment management"
          operations:
            - name: list-commitment-plans-gcp
              method: GET
              description: "List GCP commitment plans"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-savings-analysis-gcp
              method: GET
              description: "Get GCP savings analysis"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8103
      namespace: spot-eco-rest-api
      resources:
        - path: /v1/commitments
          name: commitments
          description: "Commitment plan management"
          operations:
            - method: GET
              name: list-commitment-plans-aws
              description: "List AWS commitment plans"
              call: "spot-eco.list-commitment-plans-aws"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: spot-eco-mcp
      transport: http
      tools:
        - name: list-commitment-plans-aws
          description: "List AWS commitment plans"
          hints:
            readOnly: true
          call: "spot-eco.list-commitment-plans-aws"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-savings-analysis-aws
          description: "Get AWS savings analysis"
          hints:
            readOnly: true
          call: "spot-eco.get-savings-analysis-aws"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-savings-plans-aws
          description: "List AWS savings plans"
          hints:
            readOnly: true
          call: "spot-eco.list-savings-plans-aws"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-unused-ris-aws
          description: "Get unused reserved instances"
          hints:
            readOnly: true
          call: "spot-eco.get-unused-ris-aws"
          outputParameters:
            - type: object
              mapping: "$."
