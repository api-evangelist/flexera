        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subscriptionId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.FLEXERA_API_KEY}}'
  exposes:
  - type: rest
    namespace: spot-administration-subscriptions-rest
    port: 8080
    description: REST adapter for Spot Administration API — Subscriptions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/events/subscription
      name: events-subscription
      description: REST surface for events-subscription.
      operations:
      - method: POST
        name: createsubscription
        description: Spot Create Event Subscription
        call: spot-administration-subscriptions.createsubscription
        with:
          body: rest.body
        outputParameters:
        - type: object
