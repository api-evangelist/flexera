    resources:
    - name: events-subscription
      path: /events/subscription
      operations:
      - name: createsubscription
        method: POST
        description: Spot Create Event Subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listsubscriptions
        method: GET
        description: Spot List Event Subscriptions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
