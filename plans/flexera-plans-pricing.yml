specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Spot
providerId: spot
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Autoscaling
  - Cloud Infrastructure
  - Containers
  - Cost Optimization
  - FinOps
  - Kubernetes
  - Spot Instances
description: Spot by NetApp (now part of Flexera following the 2024 acquisition) bills its cloud-cost-optimization products (Elastigroup, Ocean, Eco, Cloud Analyzer) primarily as a percentage of customer cloud savings, with no public rate card. Trial access is available; production deployments are negotiated.
notes: Spot historically used a "20% of net savings delivered" pricing model on Eco / commitment-management products with Elastigroup priced as a percentage of compute savings. Exact percentages and minimums are not publicly listed and may have changed under Flexera ownership; treating all numeric fees as contact-sales.
sources:
  - https://www.flexera.com/products
  - https://spot.io/products/
plans:
  - id: spot-trial
    name: Free Trial / Free Tier
    type: freemium
    description: Time-limited or capacity-limited trial of Spot products (Ocean, Elastigroup, Eco, Cloud Analyzer) for evaluation. Cloud Analyzer in particular has historically offered a free read-only assessment tier.
    entries:
      - label: Trial Access
        description: Evaluation tier; not for production use
        name: trial
        type: flat
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://api.spotinst.io
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Cloud Analyzer (Read-Only Assessment)
      - name: Sandbox / Trial Access
      - name: Public Documentation
  - id: spot-savings-share
    name: Production (Savings-Share)
    type: usage-based
    description: Production Spot products are typically billed as a share of net cloud savings delivered (Eco) or of compute spend optimized (Ocean, Elastigroup). Historical published rate was approximately a 20% share of savings on Eco; current pricing under Flexera is contact-sales.
    entries:
      - label: Spot Eco (Commitment Management)
        description: Share of savings on AWS / Azure / GCP commitment portfolio managed by Eco
        name: eco_savings_share
        type: tiered
        metric: USD
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://api.spotinst.io
        unit: 1
        price: contact sales (historically ~20% of net savings)
        userMultiplied: false
      - label: Spot Ocean (K8s)
        description: Per-cluster or savings-share pricing on Ocean Kubernetes autoscaling
        name: ocean
        type: usage-based
        metric: cluster
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://api.spotinst.io
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Spot Elastigroup
        description: Spot-instance orchestration; share of compute savings
        name: elastigroup
        type: usage-based
        metric: compute_hour
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://api.spotinst.io
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Production API Access
      - name: Multi-Cloud (AWS, Azure, GCP)
      - name: Email / Premium Support
      - name: Spot Console
  - id: spot-enterprise
    name: Enterprise (Flexera One)
    type: enterprise
    description: Bundled Spot products under a Flexera One enterprise agreement. Custom pricing, dedicated support, integration with Flexera ITAM/SaaS Management, and volume commitments.
    entries:
      - label: Enterprise Agreement
        description: Custom Flexera One bundle
        name: enterprise
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: configurable
        domains:
          - https://api.spotinst.io
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Flexera One Integration
      - name: Dedicated Account Management
      - name: Contractual SLA
      - name: Multi-Product Bundle
maintainers: []
