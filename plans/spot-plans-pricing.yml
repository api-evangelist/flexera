specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Spot
providerId: spot
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Autoscaling
  - Cloud Infrastructure
  - Containers
  - Cost Optimization
  - FinOps
  - Kubernetes
  - Spot Instances
description: Spot (originally Spot by NetApp, now Spot by Flexera following the
  Flexera acquisition) sells cloud-cost-optimization products including Ocean
  (Kubernetes), Elastigroup (compute), Eco (RI/SP management), and Cloud
  Analyzer. Pricing is not published — the historical model has been a percentage
  of realized cloud savings or a per-resource subscription, both quote-based.
sources:
  - https://spot.io/
  - https://www.flexera.com/
notes: spot.io and the Spot pricing page now redirect to flexera.com; Flexera
  does not publish a self-serve price list for the Spot product line. Pricing
  is contact-sales and varies by product, cloud spend, and contract term.
plans:
  - id: spot-contact-sales
    name: Contact Sales
    type: enterprise
    description: All Spot products (Ocean, Elastigroup, Eco, Cloud Analyzer) are
      licensed via Flexera direct sales. Common commercial structures include a
      percentage of realized cloud savings or a per-managed-resource
      subscription, but specific terms are not public.
    entries:
      - label: Custom License
        name: custom_license
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Ocean (Kubernetes Autoscaling)
      - name: Elastigroup (Compute Autoscaling)
      - name: Eco (RI / Savings Plan Management)
      - name: Cloud Analyzer
      - name: Negotiated SLA
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
