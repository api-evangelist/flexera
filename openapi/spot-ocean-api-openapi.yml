              type: object
              properties:
                isEnabled:
                  type: boolean
                isAutoConfig:
                  type: boolean
            capacity:
              type: object
              properties:
                target:
                  type: integer
                minimum:
                  type: integer
                maximum:
                  type: integer
          example: example_value
    OceanAKSClusterRequest:
      type: object
      properties:
        cluster:
          type: object
          properties:
            name:
              type: string
            controllerClusterId:
              type: string
            aks:
              type: object
              properties:
                clusterName:
                  type: string
                resourceGroupName:
                  type: string
                region:
                  type: string
            autoScaler:
              type: object
              properties:
                isEnabled:
                  type: boolean
