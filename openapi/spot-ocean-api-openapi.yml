openapi: 3.1.0
info:
  title: Spot Ocean API
  description: >-
    The Spot Ocean API provides programmatic management of Ocean Kubernetes
    clusters across AWS EKS, Azure AKS, GCP GKE, and Amazon ECS. Ocean is
    a serverless Kubernetes infrastructure engine that automatically manages
    and optimizes cloud infrastructure for containers, handling node
    provisioning, scaling, and cost optimization with intelligent use of
    spot instances, reserved capacity, and on-demand resources.
  version: 2.0.0
  contact:
    name: Spot by Flexera
    url: https://docs.spot.io/
  termsOfService: https://spot.io/terms-of-use/
servers:
- url: https://api.spotinst.io
  description: Spot Production API
security:
- bearerAuth: []
tags:
- name: Ocean AKS
  description: Manage Ocean clusters for Azure Kubernetes Service.
- name: Ocean AWS
  description: Manage Ocean clusters for AWS EKS.
- name: Ocean CD
  description: Manage continuous delivery for Ocean clusters.
- name: Ocean ECS
  description: Manage Ocean clusters for Amazon ECS.
- name: Ocean GKE
  description: Manage Ocean clusters for Google Kubernetes Engine.
- name: Ocean Spark
  description: Manage Apache Spark clusters on Ocean.
- name: Right Sizing
  description: Get right-sizing recommendations for Ocean workloads.
- name: Rolls
  description: Manage rolling updates for Ocean clusters.
- name: Virtual Node Groups
  description: Manage virtual node groups (launch specifications) within Ocean clusters.
paths:
  /ocean/aws/k8s/cluster:
    post:
      operationId: createOceanClusterAWS
      summary: Spot Create Ocean Cluster (aws)
      description: Create a new Ocean cluster for AWS EKS.
      tags:
      - Ocean AWS
      parameters:
      - name: accountId
        in: query
        schema:
          type: string
        example: '500123'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OceanAWSClusterRequest'
            examples:
              CreateoceanclusterawsRequestExample:
                summary: Default createOceanClusterAWS request
                x-microcks-default: true
                value:
                  cluster:
                    name: Example Title
                    controllerClusterId: '500123'
                    region: example_value
                    autoScaler:
                      isEnabled: true
                      isAutoConfig: true
                      cooldown: 10
                      resourceLimits:
                        maxMemoryGib: 10
                        maxVCpu: 10
                      down:
                        maxScaleDownPercentage: 10
                    capacity:
                      target: 10
                      minimum: 10
                      maximum: 10
                    strategy:
                      spotPercentage: 10
                      fallbackToOd: true
                      utilizeReservedInstances: true
                      utilizeCommitments: true
                    compute:
                      instanceTypes:
                        whitelist: {}
                        blacklist: {}
                      subnetIds:
                      - {}
                      launchSpecification:
                        imageId: '500123'
                        securityGroupIds: {}
                        keyPair: example_value
                        tags: {}
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OceanClusterResponse'
              examples:
                Createoceanclusteraws200Example:
                  summary: Default createOceanClusterAWS 200 response
                  x-microcks-default: true
                  value:
                    request: example_value
                    response:
                      items:
                      - {}
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    get:
      operationId: listOceanClustersAWS
      summary: Spot List Ocean Clusters (aws)
      description: List all Ocean clusters for AWS in the account.
      tags:
      - Ocean AWS
      parameters:
      - name: accountId
        in: query
        schema:
          type: string
        example: '500123'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OceanClusterListResponse'
              examples:
                Listoceanclustersaws200Example:
                  summary: Default listOceanClustersAWS 200 response
                  x-microcks-default: true
