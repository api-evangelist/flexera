components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >-
        Spot API uses Bearer Token Authentication. Include your API token
        in the Authorization header.
  schemas:
    ElastigroupAWSRequest:
      type: object
      properties:
        group:
          type: object
          properties:
            name:
              type: string
            description:
              type: string
            region:
              type: string
            capacity:
              type: object
              properties:
                target:
                  type: integer
                minimum:
                  type: integer
                maximum:
                  type: integer
                unit:
                  type: string
                  enum:
                  - instance
                  - weight
            strategy:
              type: object
              properties:
                risk:
                  type: integer
                  description: Percentage of spot instances (0-100).
                onDemandCount:
                  type: integer
                availabilityVsCost:
                  type: string
                  enum:
                  - balanced
                  - costOriented
                  - availabilityOriented
                  - cheapest
                fallbackToOd:
                  type: boolean
                utilizeReservedInstances:
                  type: boolean
            compute:
              type: object
              properties:
                instanceTypes:
                  type: object
                  properties:
                    ondemand:
                      type: string
                    spot:
                      type: array
                      items:
                        type: string
                availabilityZones:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      subnetId:
